<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festiva | Mon Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        .dashboard-header {
            margin: 80px 0 40px;
        }

        .dashboard-header h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, white, var(--secondary));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .dashboard-header p {
            color: var(--text-muted);
        }

        .dashboard-tabs {
            display: flex;
            gap: 2rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 3rem;
        }

        .tab {
            padding-bottom: 1rem;
            font-weight: 700;
            cursor: pointer;
            color: var(--text-muted);
            transition: var(--transition);
            border-bottom: 3px solid transparent;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .booking-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 100px;
        }

        .booking-item {
            background: var(--surface);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            padding: 1.5rem;
            border-radius: 20px;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 2rem;
            transition: var(--transition);
        }

        .booking-item:hover {
            transform: scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 0 30px var(--primary-glow);
        }

        .status-badge {
            padding: 0.5rem 1.25rem;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .status-confirmed {
            background: rgba(16, 185, 129, 0.1);
            color: #10B981;
            border: 1px solid #10B981;
            box-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.1);
            color: #F59E0B;
            border: 1px solid #F59E0B;
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="bg-particles"></div>
    <nav class="navbar"></nav>

    <main class="container">
        <header class="dashboard-header">
            <h1 id="welcomeTitle">Bonjour 👋</h1>
            <p>Gérez vos réservations d'événements.</p>
        </header>

        <div class="dashboard-tabs">
            <div class="tab active">Mes Réservations</div>
            <div class="tab">Favoris</div>
            <div class="tab">Mon Profil</div>
        </div>

        <div class="booking-list">
            <div class="booking-item">
                <img src="https://images.unsplash.com/photo-1544928147-79723ec7f415?auto=format&fit=crop&q=80&w=200"
                    alt="">
                <div class="booking-info">
                    <h3>Château de la Roche</h3>
                    <p>Le 24 Mai 2024 • Versailles</p>
                </div>
                <div class="status-badge status-confirmed">Confirmé</div>
            </div>
            <div class="booking-item">
                <img src="https://images.unsplash.com/photo-1519167758481-83f550bb49b3?auto=format&fit=crop&q=80&w=200"
                    alt="">
                <div class="booking-info">
                    <h3>Le Loft Industriel</h3>
                    <p>Le 12 Juin 2024 • Paris</p>
                </div>
                <div class="status-badge status-pending">En attente</div>
            </div>
        </div>
    </main>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = getUser();
            if (user) {
                document.getElementById('welcomeTitle').textContent = `Bonjour, ${user.name} 👋`;
            }
        });
    </script>
</body>

</html>
