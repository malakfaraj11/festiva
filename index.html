<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festiva | Location de salles d'exception</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="bg-grid"></div>
    <div class="bg-particles"></div>
    <div class="bg-3d-scene">
        <div class="floating-cube" style="top: 20%; left: 10%; animation-delay: 0s;">
            <div class="face face-front"></div>
            <div class="face face-back"></div>
            <div class="face face-right"></div>
            <div class="face face-left"></div>
            <div class="face face-top"></div>
            <div class="face face-bottom"></div>
        </div>
        <div class="floating-cube" style="top: 60%; left: 80%; animation-delay: -5s; width: 60px; height: 60px;">
            <div class="face face-front"></div>
            <div class="face face-back"></div>
            <div class="face face-right"></div>
            <div class="face face-left"></div>
            <div class="face face-top"></div>
            <div class="face face-bottom"></div>
        </div>
        <div class="floating-cube" style="top: 80%; left: 15%; animation-delay: -10s; width: 80px; height: 80px;">
            <div class="face face-front"></div>
            <div class="face face-back"></div>
            <div class="face face-right"></div>
            <div class="face face-left"></div>
            <div class="face face-top"></div>
            <div class="face face-bottom"></div>
        </div>
    </div>
    <nav class="navbar">
        <div class="nav-links">
            <!-- Injected by auth.js -->
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>Trouvez la salle parfaite pour vos <span>festivités</span>.</h1>
            <p>Des lieux d'exception sélectionnés avec soin pour vos mariages, soirées et événements professionnels.</p>

            <div class="search-container">
                <div class="search-field">
                    <label>Événement</label>
                    <input type="text" placeholder="Mariage, Soirée, Gala...">
                </div>
                <div class="search-field">
                    <label>Localisation</label>
                    <input type="text" placeholder="Paris, Bordeaux, Versailles...">
                </div>
                <div class="search-field">
                    <label>Date</label>
                    <input type="date">
                </div>
                <button class="btn-search">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="container">
        <h2 class="section-title">Nos salles à la une</h2>
        <div id="venue-grid" class="venue-grid">
            <!-- Dynamicly injected by app.js -->
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
