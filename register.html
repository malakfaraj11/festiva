<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festiva | Inscription</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <style>
        .auth-container {
            min-height: calc(100vh - 90px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }

        .auth-card {
            background: var(--surface);
            backdrop-filter: var(--glass);
            -webkit-backdrop-filter: var(--glass);
            padding: 3.5rem;
            border-radius: 24px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            position: relative;
            z-index: 10;
        }

        .auth-card h2 {
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, white, var(--text-muted));
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-card p {
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-main);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .form-group select option {
            background: var(--background);
            color: white;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .btn-auth {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border-radius: 8px;
            font-weight: 700;
            font-size: 1rem;
            margin-top: 1rem;
        }

        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            font-weight: 700;
        }
    </style>
</head>

<body>
    <div class="bg-grid"></div>
    <div class="bg-particles"></div>
    <nav class="navbar"></nav>

    <div class="auth-container">
        <div class="auth-card">
            <h2>Rejoignez-nous.</h2>
            <p>Créez un compte pour louer ou proposer une salle.</p>
            <form id="registerForm">
                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" id="regName" placeholder="Jean Dupont" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="nom@exemple.com" required>
                </div>
                <div class="form-group">
                    <label>Vous êtes</label>
                    <select id="regRole">
                        <option value="client">Client (Je cherche une salle)</option>
                        <option value="owner">Propriétaire (Je loue ma salle)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth">S'inscrire</button>
            </form>
            <script src="js/auth.js"></script>
            <script>
                document.getElementById('registerForm').addEventListener('submit', function(e) {
                    e.preventDefault();
                    const name = document.getElementById('regName').value;
                    const email = document.getElementById('regEmail').value;
                    const role = document.getElementById('regRole').value;
                    
                    saveUser(name, email, role);
                    window.location.href = 'index.html';
                });
            </script>
            <div class="auth-footer">
                Déjà un compte ? <a href="login.html">Se connecter</a>
            </div>
        </div>
    </div>
</body>

</html>
